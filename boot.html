<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#03050a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Choque de Héroes TCG</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050a;
  --neon:#00cfff;
  --gold:#f5a623;
  --red:#ff2244;
  --purple:#cc55ff;
  --panel:#0b0b16;
}
html,body{
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ══════════════════════════════
   PANTALLA DE BOOT
══════════════════════════════ */
#boot{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:100;overflow:hidden;
  background:var(--bg);
}

/* ── VIÑETAS ── */
.panels{
  position:absolute;inset:0;
  display:grid;
  grid-template-columns:40% 28% 32%;
  grid-template-rows:45% 55%;
  gap:3px;padding:3px;
  opacity:0;
  animation:panelsFadeIn 1.2s 0.3s ease forwards;
}
.panel{
  background:var(--panel);
  border:1.5px solid #14142a;
  position:relative;overflow:hidden;
}

/* Texturas individuales */
.p1::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-52deg,transparent,transparent 10px,
    rgba(0,207,255,0.06) 10px,rgba(0,207,255,0.06) 11px);
}
.p1::after{
  content:'';position:absolute;
  bottom:-40px;right:-40px;
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(0,207,255,0.1) 0%,transparent 65%);
}

.p2::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(245,166,35,0.22) 1px,transparent 1px);
  background-size:13px 13px;
}

.p3{grid-column:3;grid-row:1/3;}
.p3::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 11px,
    rgba(204,85,255,0.05) 11px,rgba(204,85,255,0.05) 12px);
}
.p3::after{
  content:'';position:absolute;top:28%;left:50%;transform:translateX(-50%);
  width:55px;height:55px;
  border:1px solid rgba(204,85,255,0.18);border-radius:50%;
  box-shadow:0 0 30px rgba(204,85,255,0.12);
}

.p4{grid-column:1/3;grid-row:2;}
.p4::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-25deg,transparent,transparent 16px,
    rgba(255,34,68,0.045) 16px,rgba(255,34,68,0.045) 17px);
}

/* Textos decorativos en viñetas */
.deco{
  position:absolute;
  font-family:'Courier New',monospace;
  font-weight:900;text-transform:uppercase;
  color:#fff;pointer-events:none;
}
.p1 .deco{bottom:10px;left:14px;font-size:8px;letter-spacing:5px;opacity:0.055;}
.p2 .deco{top:10px;right:10px;font-size:8px;letter-spacing:3px;opacity:0.06;writing-mode:vertical-lr;}
.p4 .deco{top:10px;left:18px;font-size:38px;letter-spacing:10px;opacity:0.035;}

/* Borde exterior viñeta */
#boot::before{
  content:'';position:absolute;inset:0;
  border:5px solid #07070f;
  z-index:3;pointer-events:none;
}

/* ── FRASE ÉPICA ── */
#phrase-wrap{
  position:absolute;
  z-index:20;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  width:100%;padding:0 24px;
  pointer-events:none;
  opacity:0;
}

/* Línea decorativa */
.divider{
  width:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--neon),var(--gold),var(--neon),transparent);
  margin:10px auto;
  transition:none;
}

.phrase-line1{
  font-family:'Bangers',cursive;
  font-size:clamp(13px,4.5vw,22px);
  letter-spacing:6px;
  color:rgba(0,207,255,0.75);
  text-transform:uppercase;
  text-align:center;
  text-shadow:0 0 20px rgba(0,207,255,0.6),0 0 40px rgba(0,207,255,0.2);
  opacity:0;
  transform:translateY(10px) skewX(-2deg);
}

.phrase-sub{
  font-family:'Bangers',cursive;
  font-size:clamp(14px,4.8vw,24px);
  letter-spacing:8px;
  color:rgba(255,255,255,0.55);
  text-transform:uppercase;
  text-align:center;
  text-shadow:0 0 15px rgba(255,255,255,0.2);
  opacity:0;
  transform:translateY(8px);
}

/* Número de universo */
.universe-badge{
  font-family:'Orbitron',monospace;
  font-size:9px;letter-spacing:6px;
  color:rgba(204,85,255,0.7);
  text-transform:uppercase;
  text-align:center;
  text-shadow:0 0 12px rgba(204,85,255,0.5);
  opacity:0;
  margin-top:4px;
}

/* Animaciones de la frase */
.phrase-line1.show{
  animation:phraseIn 1s 0s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes phraseIn{
  from{opacity:0;transform:translateY(14px) skewX(-2deg)}
  to{opacity:1;transform:translateY(0) skewX(-2deg)}
}
  60%{opacity:1;transform:scale(1.05) translateY(-4px)}
  80%{transform:scale(0.98) translateY(2px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes subIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:0.7;transform:translateY(0)}
}
@keyframes dividerExpand{
  from{width:0}
  to{width:min(80vw,280px)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── LOGO ── */
.center-panel{
  position:absolute;z-index:20;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
  opacity:0;
}
.ring{
  position:absolute;
  width:min(74vw,340px);height:min(74vw,340px);
  border-radius:50%;
  border:1.5px solid rgba(0,207,255,0.3);
  opacity:0;
  animation:ringPulse 2.4s 0s ease-out infinite;
}
.ring:nth-child(2){
  animation-delay:1.2s;
  border-color:rgba(245,166,35,0.22);
  width:min(85vw,390px);height:min(85vw,390px);
}
.boot-logo{
  width:min(80vw,350px);
  opacity:0;
  transform:scale(0.5) translateY(30px);
  filter:
    drop-shadow(0 0 30px rgba(0,207,255,0.8))
    drop-shadow(0 0 65px rgba(0,207,255,0.3))
    drop-shadow(0 12px 40px rgba(0,0,0,1));
}

/* ── BARRA DE CARGA ── */
.bar-wrap{
  position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
  width:min(68vw,255px);
  opacity:0;
}
.bar-track{
  width:100%;height:2px;
  background:rgba(255,255,255,0.06);
  border-radius:2px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--neon),var(--gold),var(--red),var(--neon));
  background-size:300% 100%;
  border-radius:2px;
}
.bar-label{
  margin-top:10px;text-align:center;
  font-family:'Orbitron',monospace;
  font-size:7px;letter-spacing:5px;
  color:rgba(0,207,255,0.5);
}

/* ── FLASH ── */
.flash{
  position:absolute;inset:0;
  background:radial-gradient(circle,#fff 0%,rgba(0,207,255,0.5) 100%);
  opacity:0;pointer-events:none;z-index:300;
}

/* ── GRAIN ── */
.grain{
  position:absolute;inset:0;z-index:15;pointer-events:none;
  opacity:0.045;mix-blend-mode:overlay;
  background-image:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXWBgYGHh4t5eXlzc3OLi4ubm5uVlZWPj4+NjY19fX2JiYl/f39ra2uRkZGZmZlpaWmXl5dvb29xcXGTk5NnZ2c8TV1mAAAAG3RSTlNAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEAvEOwtAAAFVklEQVR4XpWWB67c2BUFb3g557T/hRo9/WUMZHlgr4Bg8Z4qQgQJlHI4A8SzFVrapvmTF9O7dmYRFZ60YiBhJRCgh1FYhiLAmdvX0CzTOpNE77ME0Zty/nWWzchDtiqrmQDeuv3powQ5ta2eN0FY0InkqDD73lT9c9lEzwUNqgFHs9VQce3TVClFCQrSTfOiYkVJQBmpbq2L6iZavPnAPcoU0dSw0SUTqz/GtrGuXfbyyBniKykOWQWGqwwMA7QiYAxi+IlPdqo+hYHnUt5ZPfnsHJyNiDtnpJyayNBkF6cWoYGAMY92ZArXtSX2uzkY0eYvFYZktYMCynxBLBMpBmH1LjOq7WRYEP4tLnGYIoRBAMlnfP+3zt94mBNmrAlVdaQiZHBChN1J9sMCuQn8QfMQNp7P0XmqXhYCABjCUBIjJBTgAAAAAASUVORK5CYII=");
}

/* ── KEYFRAMES GLOBALES ── */
@keyframes panelsFadeIn{
  from{opacity:0;transform:scale(1.04)}
  to{opacity:1;transform:scale(1)}
}
@keyframes ringPulse{
  0%{opacity:0.6;transform:scale(0.25)}
  100%{opacity:0;transform:scale(1.8)}
}
@keyframes logoIn{
  0%{opacity:0;transform:scale(0.5) translateY(30px)}
  55%{opacity:1;transform:scale(1.09) translateY(-6px)}
  78%{transform:scale(0.96) translateY(3px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes barFadeIn{
  from{opacity:0;transform:translateX(-50%) translateY(12px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}
@keyframes barFill{
  0%{width:0%;background-position:0% 0}
  45%{width:60%}
  75%{width:85%}
  95%{width:97%}
  100%{width:100%}
}
@keyframes barShimmer{
  from{background-position:0% 0}
  to{background-position:300% 0}
}
@keyframes flashBurst{
  0%{opacity:0.92}
  100%{opacity:0}
}
@keyframes bootOut{
  from{opacity:1;transform:scale(1)}
  to{opacity:0;transform:scale(1.07)}
}
#boot.done{
  animation:bootOut 0.45s ease-in forwards;
}
</style>
</head>

    <div class="panel p1"><div id="sl"></div><span class="deco">TCG</span></div>

  <!-- FRASE ÉPICA -->
  <div id="phrase-wrap">

    <div class="divider"></div>

    <div class="universe-badge">◈ UNIVERSO CODEX · TIERRA-CHH · ◈</div>
  </div>

<script>
// ── Speedlines en p1 ──
const sl = document.getElementById('sl');
sl.style.cssText = 'position:absolute;inset:0;overflow:hidden;';
for(let i=0;i<22;i++){
  const l = document.createElement('div');
  l.style.cssText = `
    position:absolute;height:1px;
    top:${Math.random()*100}%;
    left:${Math.random()*12}%;
    width:${20+Math.random()*60}%;
    opacity:${0.04+Math.random()*0.13};
    background:linear-gradient(90deg,transparent,rgba(0,207,255,0.55),transparent);
    transform:rotate(${-5+Math.random()*10}deg);
  `;
  sl.appendChild(l);
}

// ── Secuencia de animación ──
const phraseWrap = document.getElementById('phrase-wrap');
const logoWrap   = document.getElementById('logoWrap');
const logoEl     = document.getElementById('logo');
const barWrap    = document.getElementById('barWrap');
const barFill    = document.getElementById('barFill');
const lbl        = document.getElementById('lbl');
const flash      = document.getElementById('flash');

const p1  = phraseWrap.querySelector('.phrase-line1');
const ps  = phraseWrap.querySelector('.phrase-sub');
const pb  = phraseWrap.querySelector('.universe-badge');
const div1= phraseWrap.querySelectorAll('.divider')[0];
const div2= phraseWrap.querySelectorAll('.divider')[1];

// 0.8s — aparece la frase
setTimeout(()=>{
  phraseWrap.style.opacity = '1';
  p1.classList.add('show');
  div1.classList.add('show');
}, 800);

// 1.6s — subtítulo aparece
setTimeout(()=>{
  div2.classList.add('show2');
  ps.classList.add('show');
}, 1600);

// 2.4s — badge de universo
setTimeout(()=> pb.classList.add('show'), 2400);

// 6.0s — frase desaparece, aparece logo
setTimeout(()=>{
  phraseWrap.style.transition = 'opacity 0.7s ease, transform 0.7s ease';
  phraseWrap.style.transform  = 'scale(0.88) translateY(-15px)';
  phraseWrap.style.opacity    = '0';

  setTimeout(()=>{
    phraseWrap.style.display = 'none';

    // Logo entra
    logoWrap.style.opacity = '1';
    logoEl.style.animation = 'logoIn 1.1s cubic-bezier(0.175,0.885,0.32,1.4) forwards';

    // Barra de carga
    setTimeout(()=>{
      barWrap.style.animation = 'barFadeIn 0.6s ease forwards';
      barFill.style.animation = 'barFill 2.2s ease-in-out forwards, barShimmer 1.2s linear infinite';

      const steps = [
        'INICIANDO PROTOCOLO',
        'ESCANEANDO MULTIVERSO',
        'SINCRONIZANDO HÉROES',
        'ACTIVANDO NEXO',
        'LISTO ⚡'
      ];
      steps.forEach((s,i) => setTimeout(()=> lbl.textContent = s, i*600));

    }, 600);

  }, 700);
}, 6000);

// Flash + redirigir
const totalTime = 6000 + 700 + 600 + 2600; // ~10s total
setTimeout(()=>{
  flash.style.animation = 'flashBurst 0.4s ease-in forwards';
  setTimeout(()=>{
