<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#03050a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Choque de Héroes — Calculadora</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050a; --bg2:#07090f;
  --neon:#00ff9d; --neon-d:#007a4a; --neon-dim:rgba(0,255,157,.1);
  --nglow:0 0 6px #00ff9d,0 0 20px rgba(0,255,157,.45);
  --gold:#f5a623; --gold-d:#7a5210;
  --gglow:0 0 8px #f5a623,0 0 22px rgba(245,166,35,.45);
  --purple:#cc55ff; --purple-d:#6a1a80; --purple-dim:rgba(180,70,255,.13);
  --pglow:0 0 8px #cc55ff,0 0 24px rgba(180,70,255,.6);
  --blue:#00cfff; --blue-d:#005f80;
  --bglow:0 0 6px #00cfff,0 0 18px rgba(0,207,255,.4);
  --red:#ff2244; --red-d:#6a0011;
  --rglow:0 0 10px #ff2244,0 0 26px rgba(255,34,68,.55);
  --muted:#3a4a60;
}
html,body{
  height:100%;background:var(--bg);color:#e0eeff;
  font-family:'Orbitron',monospace;
  overflow:hidden;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);
  pointer-events:none;z-index:1000;
}
#app{
  display:flex;flex-direction:column;
  height:100dvh;max-width:480px;
  margin:0 auto;position:relative;overflow:hidden;
}

/* ═══ PLAYER ZONE ═══ */
.pzone{
  flex:1;display:flex;flex-direction:column;
  padding:8px 10px 6px;
  position:relative;overflow:hidden;min-height:0;background:var(--bg);
}
.pzone.p2{transform:rotate(180deg);}
.pzone.p1::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 40% at 50% 110%,rgba(0,255,157,.05) 0%,transparent 70%);}
.pzone.p2::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 40% at 50% 110%,rgba(0,207,255,.05) 0%,transparent 70%);}
.pzone.dmg{animation:zdmg .4s ease;}
@keyframes zdmg{0%{background:var(--bg)}30%{background:#180008}100%{background:var(--bg)}}

.bk{position:absolute;width:12px;height:12px;opacity:.5;}
.bk-tl{top:5px;left:5px;border-top:1.5px solid var(--neon);border-left:1.5px solid var(--neon);}
.bk-tr{top:5px;right:5px;border-top:1.5px solid var(--neon);border-right:1.5px solid var(--neon);}
.bk-bl{bottom:5px;left:5px;border-bottom:1.5px solid var(--neon);border-left:1.5px solid var(--neon);}
.bk-br{bottom:5px;right:5px;border-bottom:1.5px solid var(--neon);border-right:1.5px solid var(--neon);}
.p2 .bk{border-color:var(--blue)!important;}

/* ── HEADER ── */
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.pname{font-size:14px;font-weight:900;letter-spacing:3px;text-transform:uppercase;}
.p1 .pname{color:var(--neon);text-shadow:var(--nglow);}
.p2 .pname{color:var(--blue);text-shadow:var(--bglow);}
.hbadge{font-size:13px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:3px;border:1px solid;}
.p1 .hbadge{color:var(--neon);border-color:var(--neon-d);background:var(--neon-dim);text-shadow:var(--nglow);}
.p2 .hbadge{color:var(--blue);border-color:var(--blue-d);background:rgba(0,207,255,.1);text-shadow:var(--bglow);}

/* ── CORAZONES ── */
.hrow{display:flex;justify-content:center;align-items:center;gap:3px;margin-bottom:7px;}
.hrt{flex:1;max-width:30px;min-width:18px;aspect-ratio:1;cursor:pointer;transition:transform .12s;}
.hrt:active{transform:scale(.78)!important;}
.hrt img{width:100%;height:100%;object-fit:contain;display:block;
  transition:filter .3s,opacity .3s;pointer-events:none;}
.hrt.alive img{filter:drop-shadow(0 0 4px rgba(255,50,50,.9)) drop-shadow(0 0 10px rgba(255,30,30,.5));}
.hrt.dead  img{filter:grayscale(1) brightness(.15);opacity:.4;}
.hrt.losing  {animation:hlose   .45s cubic-bezier(.36,.07,.19,.97) both;}
.hrt.reviving{animation:hrevive .5s  cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes hlose  {0%{transform:scale(1.6)}35%{transform:scale(.4)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes hrevive{0%{transform:scale(.3);opacity:.2}60%{transform:scale(1.35)}100%{transform:scale(1);opacity:1}}

/* ── SECTORES ── */
.sectors{display:flex;gap:6px;flex:1;min-height:0;}
.sector{flex:1;display:flex;flex-direction:column;gap:4px;}
.slabel{
  font-size:9px;font-weight:900;letter-spacing:2px;
  text-transform:uppercase;text-align:center;
  padding:3px 2px;border-radius:3px;
  color:var(--purple);text-shadow:var(--pglow);
  border:1px solid var(--purple-d);background:var(--purple-dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.scards{display:flex;gap:5px;flex:1;min-height:0;}

/* ── ZONA DE PERSONAJE — fondo traslúcido morado, sin imagen ── */
.zona{
  flex:1;min-height:0;border-radius:6px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:5px 3px 6px;
  position:relative;overflow:hidden;
  background:rgba(55,10,80,.35);
  border:1px solid var(--purple-d);
  box-shadow:0 0 12px rgba(180,70,255,.18),inset 0 0 18px rgba(40,5,65,.45);
}
/* borde interior sutil */
.zona::before{
  content:'';position:absolute;inset:2px;border-radius:4px;
  border:1px solid rgba(180,70,255,.18);pointer-events:none;
}
/* línea glow top */
.zona::after{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:.6;
}

/* símbolo centrado — posición absoluta sobre el fondo */
.zona-sym{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-55%);
  width:74%;aspect-ratio:1;
  z-index:1;pointer-events:none;
}
.zona-sym img{
  width:100%;height:100%;object-fit:contain;display:block;
  filter:drop-shadow(0 0 7px rgba(180,70,255,.95)) drop-shadow(0 0 18px rgba(180,70,255,.5));
  opacity:.7;
}

/* contenido inferior sobre el símbolo */
.zona-body{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  width:100%;margin-top:auto;
}
.zona-hp{
  font-size:28px;font-weight:900;letter-spacing:1px;line-height:1;
  transition:color .2s,text-shadow .2s;
}
.zona-hp.active{color:var(--purple);text-shadow:var(--pglow);}
.zona-hp.zero  {color:var(--muted);text-shadow:none;}
.zona-name{
  font-size:7px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:rgba(200,140,255,.4);
}
.zona-btns{display:flex;gap:4px;margin-top:4px;}
.zbtn{
  width:34px;height:34px;border-radius:4px;
  border:1px solid var(--purple-d);background:rgba(3,5,10,.65);
  font-size:22px;font-weight:900;color:var(--purple);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .1s,transform .1s;line-height:1;
  text-shadow:var(--pglow);
}
.zbtn:active{transform:scale(.82);background:var(--purple-dim);}
.zona.hit{animation:zhit .25s ease;}
@keyframes zhit{0%{filter:brightness(1)}50%{filter:brightness(1.6) saturate(1.4)}100%{filter:brightness(1)}}

/* ═══ DIVISOR ═══ */
#divider{
  height:46px;display:flex;align-items:center;justify-content:space-between;
  gap:6px;padding:0 10px;background:var(--bg2);
  border-top:1px solid var(--neon-d);border-bottom:1px solid var(--neon-d);
  flex-shrink:0;position:relative;z-index:10;
}
#divider::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:.45;}
#divider::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:.45;}
.div-vs{
  font-size:30px;font-weight:900;letter-spacing:10px;
  color:var(--gold);text-shadow:var(--gglow);
}
.act-btn{
  font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--neon-d);background:transparent;
  border:1px solid var(--neon-d);padding:5px 9px;border-radius:3px;cursor:pointer;
  transition:color .2s,border-color .2s,background .2s;
}
.act-btn:active{color:var(--neon);border-color:var(--neon);background:var(--neon-dim);text-shadow:var(--nglow);}

/* ═══ OVERLAY ═══ */
#ov{
  position:absolute;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .5s;
  background:rgba(3,5,10,.97);
}
#ov.on{opacity:1;pointer-events:all;}
#ov::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 4px);}
.ov-glow{position:absolute;inset:0;opacity:0;transition:opacity .9s .4s;pointer-events:none;}
#ov.on .ov-glow{opacity:1;}
.gn{background:radial-gradient(ellipse 65% 50% at 50% 35%,rgba(0,255,157,.2) 0%,transparent 70%);}
.gb{background:radial-gradient(ellipse 65% 50% at 50% 35%,rgba(0,207,255,.2) 0%,transparent 70%);}
.ov-c{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;padding:0 24px;}
.ov-sub{font-size:9px;font-weight:700;letter-spacing:6px;color:var(--muted);animation:fsi .5s .3s both;}
.ov-wname{font-size:26px;font-weight:900;letter-spacing:3px;line-height:1.1;animation:fsi .5s .5s both;}
.ov-gana{font-family:'Cinzel Decorative',serif;font-size:52px;font-weight:900;letter-spacing:4px;
  animation:bigpop .7s .7s cubic-bezier(.175,.885,.32,1.275) both;}
.nc{color:var(--neon);text-shadow:var(--nglow);}
.bc{color:var(--blue);text-shadow:var(--bglow);}
.gc{color:var(--gold);text-shadow:var(--gglow);}
.ov-line{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--neon-d),transparent);
  margin:14px 0;animation:fsi .5s .9s both;}
.ov-loser{display:flex;flex-direction:column;align-items:center;gap:6px;animation:fsi .5s 1s both;}
.ov-lname{font-size:16px;font-weight:700;letter-spacing:2px;color:var(--muted);}
.ov-def{font-size:10px;font-weight:700;letter-spacing:4px;color:var(--red);
  border:1px solid var(--red-d);padding:5px 20px;border-radius:2px;
  background:rgba(255,34,68,.08);text-shadow:var(--rglow);}
.ov-restart{margin-top:28px;font-size:10px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--neon);background:transparent;
  border:1px solid var(--neon-d);padding:12px 32px;border-radius:3px;cursor:pointer;
  text-shadow:var(--nglow);box-shadow:inset 0 0 16px var(--neon-dim);
  animation:fsi .5s 1.2s both;transition:background .2s;}
.ov-restart:active{background:var(--neon-dim);}
@keyframes fsi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes bigpop{from{opacity:0;transform:scale(.25)}to{opacity:1;transform:scale(1)}}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="app">

  <div class="pzone p2" id="z2">
    <div class="bk bk-tl"></div><div class="bk bk-tr"></div>
    <div class="phdr">
      <div class="pname" id="nm2">Jugador 2</div>
      <div class="hbadge">❤ <span id="hl2">10</span>/10</div>
    </div>
    <div class="hrow" id="hr2"></div>
    <div class="sectors" id="sec2"></div>
    <div class="bk bk-bl"></div><div class="bk bk-br"></div>
  </div>

  <div id="divider">
    <button class="act-btn back-btn" onclick="window.location.href='index.html'">← Menú</button>
    <button class="act-btn" onclick="editNames()">✎ Nombres</button>
    <div class="div-vs">VS</div>
    <button class="act-btn" onclick="resetGame()">↺ Reset</button>
  </div>

  <div class="pzone p1" id="z1">
    <div class="bk bk-tl"></div><div class="bk bk-tr"></div>
    <div class="phdr">
      <div class="pname" id="nm1">Jugador 1</div>
      <div class="hbadge">❤ <span id="hl1">10</span>/10</div>
    </div>
    <div class="hrow" id="hr1"></div>
    <div class="sectors" id="sec1"></div>
    <div class="bk bk-bl"></div><div class="bk bk-br"></div>
  </div>

  <div id="ov">
    <div class="ov-glow gn" id="og"></div>
    <div class="bk bk-tl" style="opacity:.7"></div><div class="bk bk-tr" style="opacity:.7"></div>
    <div class="bk bk-bl" style="opacity:.7"></div><div class="bk bk-br" style="opacity:.7"></div>
    <div class="ov-c">
      <div class="ov-sub">— Victoria —</div>
      <div class="ov-wname nc" id="ov-wn">Jugador 1</div>
      <div class="ov-gana gc">¡GANA!</div>
      <div class="ov-line"></div>
      <div class="ov-loser">
        <div class="ov-lname" id="ov-ln">Jugador 2</div>
        <div class="ov-def">✕ DERROTA</div>
      </div>
      <button class="ov-restart" onclick="resetGame()">↺ Nueva Partida</button>
    </div>
  </div>
</div>

const S={p1:{name:'Jugador 1',h:TH,c:[0,0,0,0]},p2:{name:'Jugador 2',h:TH,c:[0,0,0,0]}};
let over=false;

const AC=window.AudioContext||window.webkitAudioContext;let ac;
function gac(){if(!ac)ac=new AC();return ac;}
function beep(f,t,d,v){try{const c=gac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
  o.start();o.stop(c.currentTime+d);}catch(e){}}
function sfxLose()  {beep(130,'sawtooth',.28,.2);}
function sfxRevive(){beep(660,'sine',.18,.15);setTimeout(()=>beep(880,'sine',.15,.12),120);}
function sfxHit()   {beep(460,'square',.07,.14);}
function sfxHeal()  {beep(860,'sine',.07,.1);}
function sfxWin(){try{const c=gac();
  [523,659,784,1047,1318].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;
    const t=c.currentTime+i*.17;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.06);
    g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);
  });}catch(e){}}

function renderH(p){
  const el=document.getElementById('hr'+p),d=p===1?S.p1:S.p2;
  el.innerHTML='';
  for(let i=0;i<TH;i++){
    const div=document.createElement('div');
    div.className='hrt '+(i<d.h?'alive':'dead');
    div.id='ht'+p+'-'+i;
    div.innerHTML='<img src="'+HSRC+'" alt="v" draggable="false">';
    el.appendChild(div);
  }
  document.getElementById('hl'+p).textContent=d.h;
}

function toggleH(p,idx){
  if(over)return;
  const pl=p===1?S.p1:S.p2;
  const el=document.getElementById('ht'+p+'-'+idx);
  if(!el)return;
  if(el.classList.contains('alive')){
    if(idx!==pl.h-1)return;
    pl.h--;sfxLose();
    if(navigator.vibrate)navigator.vibrate([50,15,50]);
    el.classList.add('losing');
    setTimeout(()=>{el.classList.remove('alive','losing');el.classList.add('dead');},450);
    document.getElementById('hl'+p).textContent=pl.h;
    const z=document.getElementById('z'+p);
    z.classList.remove('dmg');void z.offsetWidth;z.classList.add('dmg');
    setTimeout(()=>z.classList.remove('dmg'),400);
    if(pl.h<=0)setTimeout(()=>showWin(p===1?2:1,p),700);
  } else {
    if(idx!==pl.h||pl.h>=TH)return;
    pl.h++;sfxRevive();
    if(navigator.vibrate)navigator.vibrate([30]);
    el.classList.remove('dead');el.classList.add('alive','reviving');
    setTimeout(()=>el.classList.remove('reviving'),500);
    document.getElementById('hl'+p).textContent=pl.h;
  }
}

function buildSectors(p){
  const el=document.getElementById('sec'+p);
  el.innerHTML='';
  const labels=['SECTOR IZQUIERDO','SECTOR DERECHO'];
  const symKeys=['izq','der'];
  [0,1].forEach(s=>{
    const sec=document.createElement('div');sec.className='sector';
    const sc=document.createElement('div');sc.className='scards';sc.id='sc'+p+'-'+s;
    sec.innerHTML='<div class="slabel">'+labels[s]+'</div>';
    sec.appendChild(sc);el.appendChild(sec);
    [0,1].forEach(ci=>{
      const idx=s*2+ci,hp=(p===1?S.p1:S.p2).c[idx];
      const zona=document.createElement('div');
      zona.className='zona';zona.id='zo'+p+'-'+idx;
      zona.innerHTML=
        '<div class="zona-sym"><img src="'+SYM[symKeys[s]]+'" alt="" draggable="false"></div>'+
        '<div class="zona-body">'+
          '<div class="zona-hp '+(hp>0?'active':'zero')+'" id="zhp'+p+'-'+idx+'">'+hp+'</div>'+
          '<div class="zona-name">PERSONAJE '+(idx+1)+'</div>'+
          '<div class="zona-btns">'+
            '<button class="zbtn" onclick="chp('+p+','+idx+',-1)">−</button>'+
            '<button class="zbtn" onclick="chp('+p+','+idx+',+1)">+</button>'+
          '</div>'+
        '</div>';
      sc.appendChild(zona);
    });
  });
}

function chp(p,i,d){
  if(over)return;
  const pl=p===1?S.p1:S.p2;
  pl.c[i]=Math.max(0,Math.min(99,pl.c[i]+d));
  const hel=document.getElementById('zhp'+p+'-'+i);
  const zel=document.getElementById('zo'+p+'-'+i);
  hel.textContent=pl.c[i];
  hel.className='zona-hp '+(pl.c[i]>0?'active':'zero');
  if(d<0){sfxHit();zel.classList.remove('hit');void zel.offsetWidth;zel.classList.add('hit');setTimeout(()=>zel.classList.remove('hit'),250);}
  else sfxHeal();
}

function showWin(w,l){
  over=true;
  document.getElementById('ov-wn').textContent=w===1?S.p1.name:S.p2.name;
  document.getElementById('ov-ln').textContent=l===1?S.p1.name:S.p2.name;
  const wnel=document.getElementById('ov-wn');
  if(w===1){wnel.className='ov-wname nc';document.getElementById('og').className='ov-glow gn';}
  else{wnel.className='ov-wname bc';document.getElementById('og').className='ov-glow gb';}
  document.getElementById('ov').classList.add('on');
  sfxWin();
  if(navigator.vibrate)navigator.vibrate([100,50,100,50,300]);
}

function resetGame(){
  over=false;S.p1.h=TH;S.p2.h=TH;S.p1.c=[0,0,0,0];S.p2.c=[0,0,0,0];
  document.getElementById('ov').classList.remove('on');renderAll();
}
function editNames(){
  const n1=prompt('Nombre del Jugador 1:',S.p1.name);
  if(n1&&n1.trim())S.p1.name=n1.trim().toUpperCase();
  const n2=prompt('Nombre del Jugador 2:',S.p2.name);
  if(n2&&n2.trim())S.p2.name=n2.trim().toUpperCase();
  document.getElementById('nm1').textContent=S.p1.name;
  document.getElementById('nm2').textContent=S.p2.name;
}
[1,2].forEach(p=>{
  document.getElementById('hr'+p).addEventListener('click',e=>{
    const h=e.target.closest('.hrt');
    if(!h)return;
    toggleH(p,parseInt(h.id.split('-')[1]));
  });
});
function renderAll(){renderH(1);renderH(2);buildSectors(1);buildSectors(2);}
renderAll();
</script>
