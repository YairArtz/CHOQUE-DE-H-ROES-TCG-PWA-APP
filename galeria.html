<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07090f">
  <title>Galería de Cartas · Choque de Héroes TCG</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --accent: #f5a623;
      --accent-glow: rgba(245,166,35,0.10);
      --accent-dim: rgba(245,166,35,0.25);
      --bg: #07090f;
      --card: rgba(12,10,5,0.97);
      --border: #2a200a;
      --text: #f0e6d0;
      --muted: #8a7a5a;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      position: relative;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Diamond grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(45deg, rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(-45deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Gold radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(245,166,35,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══ BARRA SUPERIOR ═══ */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, rgba(7,9,15,0.98) 0%, rgba(7,9,15,0.95) 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(20px);
    }

    .top-bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    }

    .back-btn {
      background: rgba(245,166,35,0.08);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
    }

    .back-btn:active {
      transform: scale(0.95);
      background: rgba(245,166,35,0.15);
      box-shadow: 0 0 20px rgba(245,166,35,0.3);
    }

    .top-title {
      flex: 1;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(245,166,35,0.4);
    }

    /* ═══ BUSCADOR ═══ */
    .search-section {
      padding: 20px 16px 16px;
      position: relative;
      z-index: 1;
    }

    .search-box {
      position: relative;
      margin-bottom: 16px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--accent);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 13px 16px 13px 48px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.10);
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    /* ═══ FILTROS DE EXPANSIÓN ═══ */
    .expansion-filters {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .expansion-filters::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1.5px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #f5a623, #e08c0a);
      border-color: var(--accent);
      color: #07090f;
      box-shadow: 0 4px 20px rgba(245,166,35,0.25);
    }

    .filter-btn:active {
      transform: scale(0.95);
    }

    /* ═══ CONTADOR DE CARTAS ═══ */
    .card-count {
      padding: 12px 16px;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
    }

    /* ═══ GRID DE CARTAS ═══ */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* Valor por defecto */
      gap: 12px;
      padding: 0 16px 80px 16px;
      position: relative;
      z-index: 1;
    }

    /* Variantes de columnas para ajustes */
    .cards-grid.cols-2 {
      grid-template-columns: repeat(2, 1fr) !important;
    }
    
    .cards-grid.cols-3 {
      grid-template-columns: repeat(3, 1fr) !important;
    }
    
    .cards-grid.cols-4 {
      grid-template-columns: repeat(4, 1fr) !important;
    }

    .card-item {
      position: relative;
      aspect-ratio: 5/7;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(12,10,5,0.6);
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .card-item:active {
      transform: scale(0.95);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(245,166,35,0.3), 0 8px 24px rgba(0,0,0,0.5);
    }

    .card-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(12,10,5,0.8), rgba(42,32,10,0.4));
      color: var(--muted);
      font-size: 10px;
      text-align: center;
      padding: 8px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    /* ═══ ESTADO VACÍO ═══ */
    .empty-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    .empty-state.active {
      display: block;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 16px;
      margin-bottom: 8px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    .empty-subtext {
      font-size: 13px;
      opacity: 0.7;
    }

    /* ═══ MODAL VISTA AMPLIADA ═══ */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7,9,15,0.98);
      z-index: 1000;
      animation: fadeIn 0.3s;
    }

    .modal.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(7,9,15,0.95) 0%, transparent 100%);
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .expansion-badge {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--accent);
      background: rgba(245,166,35,0.08);
      border: 1px solid var(--accent-dim);
      padding: 6px 14px;
      border-radius: 4px;
    }

    .close-btn {
      background: rgba(245,166,35,0.08);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-size: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
    }

    .close-btn:active {
      transform: scale(0.9);
      background: rgba(245,166,35,0.15);
      box-shadow: 0 0 20px rgba(245,166,35,0.4);
    }

    .modal-card-container {
      max-width: 90%;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-card-img {
      width: 100%;
      max-width: 360px;
      border-radius: 12px;
      border: 2px solid var(--accent);
      box-shadow: 
        0 20px 60px rgba(245,166,35,0.3), 
        0 0 40px rgba(245,166,35,0.2),
        0 8px 32px rgba(0,0,0,0.6);
    }

    .modal-card-info {
      margin-top: 24px;
      text-align: center;
      padding: 0 20px;
    }

    .modal-card-name {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(245,166,35,0.6);
      margin-bottom: 8px;
    }

    .modal-card-type {
      font-size: 14px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
      font-family: 'Orbitron', sans-serif;
    }
  </style>
</head>
<body>

  <!-- BARRA SUPERIOR -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">←</a>
    <div class="top-title">🃏 GALERÍA DE CARTAS</div>
  </div>

  <!-- SECCIÓN DE BÚSQUEDA -->
  <div class="search-section">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        class="search-input" 
        id="searchInput"
        placeholder="Buscar por nombre o tipo..."
      >
    </div>

    <!-- FILTROS DE EXPANSIÓN -->
    <div class="expansion-filters" id="expansionFilters">
      <!-- Los filtros se generan dinámicamente desde el JSON -->
    </div>
  </div>

  <!-- CONTADOR -->
  <div class="card-count" id="cardCount">
    Cargando cartas...
  </div>

  <!-- DEBUG INFO (temporal) -->
  <div style="background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); padding: 12px; margin: 0 16px 16px; border-radius: 6px; font-family: monospace; font-size: 11px; color: #f5a623; position: relative; z-index: 1;" id="debugInfo">
    🔍 Cargando...
  </div>

  <!-- GRID DE CARTAS -->
  <div class="cards-grid" id="cardsGrid">
    <!-- Las cartas se cargan dinámicamente desde cartas.json -->
  </div>

  <!-- ESTADO VACÍO -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🃏</div>
    <div class="empty-text">No se encontraron cartas</div>
    <div class="empty-subtext">Intenta con otro término de búsqueda</div>
  </div>

  <!-- MODAL VISTA AMPLIADA -->
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="expansion-badge" id="modalExpansionBadge"></span>
      <button class="close-btn" id="closeModal">×</button>
    </div>
    <div class="modal-card-container">
      <img src="" alt="Carta" class="modal-card-img" id="modalCardImg">
      <div class="modal-card-info">
        <div class="modal-card-name" id="modalCardName"></div>
        <div class="modal-card-type" id="modalCardType"></div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // VARIABLES GLOBALES
    // ═══════════════════════════════════════════════════════
    
    let allCards = [];
    let filteredCards = [];
    let currentExpansion = 'todas';

    const cardsGrid = document.getElementById('cardsGrid');
    const searchInput = document.getElementById('searchInput');
    const expansionFilters = document.getElementById('expansionFilters');
    const cardCount = document.getElementById('cardCount');
    const emptyState = document.getElementById('emptyState');
    const modal = document.getElementById('modal');
    const closeModalBtn = document.getElementById('closeModal');

    // ═══════════════════════════════════════════════════════
    // FUNCIONES PRINCIPALES
    // ═══════════════════════════════════════════════════════

    async function loadCards() {
      const debugInfo = document.getElementById('debugInfo');
      try {
        debugInfo.textContent = '📡 Solicitando cartas.json...';
        
        const response = await fetch('cartas.json');
        debugInfo.textContent = `📊 Respuesta: ${response.status} - Parseando...`;
        
        allCards = await response.json();
        debugInfo.textContent = `✅ ${allCards.length} cartas cargadas`;
        
        filteredCards = [...allCards];
        
        // Generar filtros dinámicamente
        generateExpansionFilters();
        
        renderCards();
        
        // Ocultar debug después de 3 segundos
        setTimeout(() => {
          debugInfo.style.display = 'none';
        }, 3000);
        
      } catch (error) {
        console.error('Error cargando cartas:', error);
        debugInfo.textContent = `❌ ERROR: ${error.message}`;
        debugInfo.style.background = 'rgba(255,77,109,0.1)';
        debugInfo.style.borderColor = 'rgba(255,77,109,0.3)';
        debugInfo.style.color = '#ff4d6d';
        
        cardCount.textContent = 'ERROR AL CARGAR LAS CARTAS';
        emptyState.classList.add('active');
        document.querySelector('.empty-text').textContent = 'Error al cargar el catálogo';
        document.querySelector('.empty-subtext').textContent = 'Verifica que cartas.json esté en el repositorio';
      }
    }

    function generateExpansionFilters() {
      // Extraer expansiones únicas del JSON
      const expansions = [...new Set(allCards.map(card => card.expansion))];
      
      // Limpiar filtros existentes
      expansionFilters.innerHTML = '';
      
      // Botón "Todas" siempre primero
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.dataset.expansion = 'todas';
      allBtn.textContent = 'Todas';
      expansionFilters.appendChild(allBtn);
      
      // Crear botón para cada expansión encontrada
      expansions.forEach(exp => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.expansion = exp;
        
        // Formatear nombre: "variantes" → "Variantes"
        // "sobre_torneo_1" → "Sobre Torneo 1"
        const formattedName = exp
          .split('_')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
        
        btn.textContent = formattedName;
        expansionFilters.appendChild(btn);
      });
    }

    function renderCards() {
      cardsGrid.innerHTML = '';

      if (filteredCards.length === 0) {
        emptyState.classList.add('active');
        cardsGrid.style.display = 'none';
        cardCount.textContent = 'NO SE ENCONTRARON CARTAS';
        return;
      }

      emptyState.classList.remove('active');
      cardsGrid.style.display = 'grid';
      cardCount.textContent = `MOSTRANDO ${filteredCards.length} ${filteredCards.length === 1 ? 'CARTA' : 'CARTAS'}`;

      filteredCards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card-item';
        cardEl.onclick = () => openModal(card);

        if (card.miniatura) {
          cardEl.innerHTML = `<img src="${card.miniatura}" alt="${card.nombre}">`;
        } else {
          cardEl.innerHTML = `<div class="card-placeholder">${card.nombre}</div>`;
        }

        cardsGrid.appendChild(cardEl);
      });
    }

    function filterCards() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      
      filteredCards = allCards.filter(card => {
        // Buscar en nombre Y en tipo
        const matchesSearch = 
          card.nombre.toLowerCase().includes(searchTerm) ||
          card.tipo.toLowerCase().includes(searchTerm);
        
        const matchesExpansion = currentExpansion === 'todas' || card.expansion === currentExpansion;
        return matchesSearch && matchesExpansion;
      });

      renderCards();
    }

    function openModal(card) {
      document.getElementById('modalCardImg').src = card.ampliada || card.miniatura || '';
      document.getElementById('modalCardName').textContent = card.nombre;
      document.getElementById('modalCardType').textContent = card.tipo;
      
      // Formatear nombre de expansión dinámicamente
      const formattedExpansion = card.expansion
        .split('_')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
      
      document.getElementById('modalExpansionBadge').textContent = formattedExpansion.toUpperCase();
      
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // ═══════════════════════════════════════════════════════
    // EVENT LISTENERS
    // ═══════════════════════════════════════════════════════

    searchInput.addEventListener('input', filterCards);

    expansionFilters.addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.remove('active');
        });
        e.target.classList.add('active');

        currentExpansion = e.target.dataset.expansion;
        filterCards();
      }
    });

    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // ═══════════════════════════════════════════════════════
    // INICIALIZACIÓN
    // ═══════════════════════════════════════════════════════

    loadCards();
  </script>

  <!-- Sistema de ajustes -->
  <script src="settings.js"></script>

</body>
</html>
