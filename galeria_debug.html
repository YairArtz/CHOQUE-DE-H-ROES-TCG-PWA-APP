<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEST - Galería Debug</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #000;
      color: #0f0;
    }
    .log {
      margin: 10px 0;
      padding: 10px;
      background: #111;
      border: 1px solid #0f0;
    }
    .error {
      color: #f00;
      border-color: #f00;
    }
    .success {
      color: #0f0;
    }
  </style>
</head>
<body>
  <h1>🔍 DEBUG - Galería de Cartas</h1>
  <div id="logs"></div>

  <script>
    const logs = document.getElementById('logs');
    
    function log(message, isError = false) {
      const div = document.createElement('div');
      div.className = isError ? 'log error' : 'log success';
      div.textContent = `${new Date().toLocaleTimeString()} - ${message}`;
      logs.appendChild(div);
      console.log(message);
    }

    log('🚀 Iniciando carga de cartas...');

    async function testLoad() {
      try {
        log('📡 Haciendo fetch a cartas.json...');
        const response = await fetch('cartas.json');
        
        log(`📊 Response status: ${response.status} ${response.statusText}`);
        log(`📊 Response ok: ${response.ok}`);
        log(`📊 Response type: ${response.type}`);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        log('📄 Parseando JSON...');
        const data = await response.json();
        
        log(`✅ JSON parseado correctamente`);
        log(`📊 Total de cartas encontradas: ${data.length}`);
        
        if (data.length > 0) {
          log(`📊 Primera carta: ${JSON.stringify(data[0], null, 2)}`);
          
          // Extraer expansiones únicas
          const expansions = [...new Set(data.map(card => card.expansion))];
          log(`📊 Expansiones encontradas: ${expansions.join(', ')}`);
          
          // Contar por expansión
          expansions.forEach(exp => {
            const count = data.filter(card => card.expansion === exp).length;
            log(`   - ${exp}: ${count} cartas`);
          });
        }
        
        log('✅ TODO FUNCIONA CORRECTAMENTE');
        
      } catch (error) {
        log(`❌ ERROR: ${error.message}`, true);
        log(`❌ Stack: ${error.stack}`, true);
      }
    }

    testLoad();
  </script>
</body>
</html>
