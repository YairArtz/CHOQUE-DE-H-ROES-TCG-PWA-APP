<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#03050a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Música · Choque de Héroes TCG</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050a;--bg2:#07090f;--bg3:#0b0e18;
  --card:rgba(12,10,5,.97);--border:#141c2a;
  --text:#e0eeff;--muted:#6a7f9a;
  --neon:#00ff9d;--neon-d:#007a4a;--neon-dim:rgba(0,255,157,.09);
  --purple:#cc55ff;--purple-d:#6a1a80;--purple-dim:rgba(180,70,255,.1);
  --blue:#00cfff;--blue-d:#005f80;--blue-dim:rgba(0,207,255,.09);
  --red:#ff2244;--red-d:#6a0011;--red-dim:rgba(255,34,68,.09);
  --gold:#f5a623;--gold-d:#7a5210;--gold-dim:rgba(245,166,35,.1);
}

html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;
  -webkit-tap-highlight-color:transparent;user-select:none;overflow-x:hidden;}
body{display:flex;flex-direction:column;align-items:center;padding:0 0 120px;position:relative;}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 40% at 15% 10%,var(--neon-dim) 0%,transparent 60%),
    radial-gradient(ellipse 70% 40% at 85% 90%,var(--blue-dim) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 40%,var(--purple-dim) 0%,transparent 60%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);
  pointer-events:none;z-index:1000;
}

/* ─── NAV ─── */
#chh-nav{
  position:sticky;top:0;z-index:999;width:100%;
  background:rgba(3,5,10,.96);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;padding:8px 14px;gap:10px;
}
#chh-nav::after{
  content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:.4;
}
.nav-back{
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:1.5px;color:var(--purple);background:transparent;
  border:1px solid rgba(180,70,255,.3);padding:6px 10px;border-radius:3px;
  cursor:pointer;text-decoration:none;white-space:nowrap;
  transition:background .15s;text-shadow:0 0 8px var(--purple);opacity:.8;
}
.nav-back:active{background:rgba(180,70,255,.12);opacity:1;}
.nav-title{
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;color:var(--purple);
  text-shadow:0 0 8px var(--purple);flex:1;text-align:center;line-height:1.2;
}
.nav-spacer{width:60px;flex-shrink:0;}

.wrap{width:100%;max-width:480px;padding:0 14px;position:relative;z-index:1;}

/* ─── HEADER ─── */
.page-header{text-align:center;padding:30px 0 20px;}
.music-icon-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;}
.music-icon-box{
  width:52px;height:52px;background:var(--purple-dim);
  border:1px solid var(--purple-d);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:26px;box-shadow:0 0 30px rgba(180,70,255,.3);
}
.page-title{
  font-family:'Orbitron',sans-serif;font-size:clamp(14px,4vw,22px);
  font-weight:900;letter-spacing:3px;color:#fff;
  text-shadow:0 0 30px rgba(180,70,255,.3);
}
.page-title span{color:var(--purple);text-shadow:0 0 20px rgba(180,70,255,.5);}
.page-sub{
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;
  color:var(--muted);margin-top:8px;text-transform:uppercase;
}

/* ─── SECTION TITLE ─── */
.stitle{
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--muted);
  padding:16px 0 10px;display:flex;align-items:center;gap:8px;
}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* ─── TRACK LIST ─── */
.track-list{display:flex;flex-direction:column;gap:4px;}

.track-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  background:var(--bg3);border:1px solid var(--border);
  transition:border-color .2s,background .2s;position:relative;overflow:hidden;
}
.track-item::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:0;
  transition:opacity .2s;
}
.track-item:hover,.track-item.active{
  border-color:var(--purple-d);background:rgba(40,5,65,.35);
}
.track-item:hover::before,.track-item.active::before{opacity:.6;}
.track-item.active{box-shadow:0 0 18px rgba(180,70,255,.14),inset 0 0 24px rgba(40,5,65,.3);}
.track-item:active{transform:scale(.98);}

.track-num{
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  color:var(--muted);width:22px;text-align:center;flex-shrink:0;
}
.track-item.active .track-num{color:var(--purple);}

.track-play-icon{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:var(--purple-dim);border:1px solid var(--purple-d);
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,box-shadow .2s;
}
.track-item.active .track-play-icon{
  background:rgba(180,70,255,.25);box-shadow:0 0 12px rgba(180,70,255,.4);
}
.track-play-icon svg{width:12px;height:12px;fill:var(--purple);}

.track-info{flex:1;min-width:0;}
.track-name{
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.5px;color:var(--text);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.track-item.active .track-name{color:var(--purple);text-shadow:0 0 10px rgba(180,70,255,.3);}

.track-artist{
  font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.track-duration{
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:1px;color:var(--muted);flex-shrink:0;
}
.track-item.active .track-duration{color:var(--purple);}

/* ─── PLAYER FIJO ─── */
.player-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:998;
  background:rgba(3,5,10,.97);border-top:1px solid var(--border);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  padding:0;
  display:none;flex-direction:column;
}
.player-bar.visible{display:flex;}
.player-bar::before{
  content:'';position:absolute;top:0;left:5%;right:5%;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:.6;
}

/* Progress bar clickable */
.progress-wrap{
  width:100%;height:6px;cursor:pointer;position:relative;
  background:rgba(180,70,255,.08);
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--purple),var(--blue));
  transition:width .15s linear;
  position:relative;
}
.progress-fill::after{
  content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;background:var(--purple);
  box-shadow:0 0 8px var(--purple);opacity:0;transition:opacity .15s;
}
.progress-wrap:hover .progress-fill::after{opacity:1;}

.player-main{display:flex;align-items:center;gap:10px;padding:8px 14px 10px;}

.player-track-info{flex:1;min-width:0;}
.player-track-name{
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.5px;color:var(--purple);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 0 8px rgba(180,70,255,.3);
}
.player-track-time{
  font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;
  color:var(--muted);margin-top:2px;
}

.player-controls{display:flex;align-items:center;gap:6px;}

.p-btn{
  width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  background:transparent;display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;
}
.p-btn svg{width:16px;height:16px;fill:var(--muted);transition:fill .15s;}
.p-btn:hover svg{fill:var(--text);}
.p-btn:active{transform:scale(.9);}

.p-btn.play-main{
  width:38px;height:38px;
  background:var(--purple-dim);border:1px solid var(--purple-d);
}
.p-btn.play-main svg{fill:var(--purple);width:18px;height:18px;}
.p-btn.play-main:hover{background:rgba(180,70,255,.25);box-shadow:0 0 14px rgba(180,70,255,.35);}

.p-btn.loop-active svg{fill:var(--neon);}
.p-btn.loop-active{background:var(--neon-dim);}

/* ─── EMPTY STATE ─── */
.state-box{text-align:center;padding:50px 20px;color:var(--muted);}
.state-box .sb-icon{font-size:48px;margin-bottom:14px;}
.state-box p{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;}
.state-box p.sb-sub{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:1px;font-family:'Rajdhani',sans-serif;}

footer{position:relative;z-index:1;text-align:center;padding:20px 0;margin-top:20px;}
footer p{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--border);letter-spacing:1px;}

/* ─── VISUALIZER ─── */
.visualizer{
  display:flex;align-items:flex-end;gap:2px;height:16px;
  margin-right:4px;
}
.visualizer .bar{
  width:3px;border-radius:1px;
  background:var(--purple);opacity:.6;
  animation:none;
}
.visualizer.playing .bar{animation:vbar .6s ease-in-out infinite alternate;}
.visualizer .bar:nth-child(1){height:6px;animation-delay:0s;}
.visualizer .bar:nth-child(2){height:12px;animation-delay:.15s;}
.visualizer .bar:nth-child(3){height:8px;animation-delay:.3s;}
.visualizer .bar:nth-child(4){height:14px;animation-delay:.1s;}
.visualizer .bar:nth-child(5){height:5px;animation-delay:.25s;}
@keyframes vbar{0%{height:4px}100%{height:16px}}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-header{animation:fadeUp .5s .05s both;}
.stitle{animation:fadeUp .5s .15s both;}
.track-list{animation:fadeUp .5s .2s both;}
</style>
</head>
<body>

  <!-- NAV -->
  <nav id="chh-nav">
    <a class="nav-back" href="index.html">← Menú</a>
    <div class="nav-title">🎵 Soundtrack</div>
    <div class="nav-spacer"></div>
  </nav>

  <div class="wrap">

    <!-- HEADER -->
    <div class="page-header">
      <div class="music-icon-row">
        <div class="music-icon-box">🎵</div>
        <div class="page-title">SOUNDTRACK <span>DE BATALLA</span></div>
      </div>
      <div class="page-sub">Pistas para tus partidas de Choque de Héroes</div>
    </div>

    <!-- TRACK LIST -->
    <div class="stitle">🎧 PISTAS</div>
    <div class="track-list" id="track-list">
      <div class="state-box">
        <div class="sb-icon">🎵</div>
        <p>CARGANDO PISTAS</p>
        <p class="sb-sub">Preparando el soundtrack…</p>
      </div>
    </div>

  </div>

  <footer><p>&copy; Codex Cómics 2016–2026 · Todos los derechos reservados</p></footer>

  <!-- PLAYER BAR FIJO -->
  <div class="player-bar" id="player-bar">
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="player-main">
      <div class="visualizer" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="player-track-info">
        <div class="player-track-name" id="p-name">—</div>
        <div class="player-track-time"><span id="p-current">0:00</span> / <span id="p-total">0:00</span></div>
      </div>
      <div class="player-controls">
        <button class="p-btn" id="btn-prev" title="Anterior" onclick="prevTrack()">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="p-btn play-main" id="btn-play" title="Play/Pause" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="p-btn" id="btn-next" title="Siguiente" onclick="nextTrack()">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2 0V6l6.5 6L8 18zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="p-btn" id="btn-loop" title="Loop" onclick="toggleLoop()">
          <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
      </div>
    </div>
  </div>

<script>
// ════════════════════════════════════════════════════════════════
//
//   🎵  CONFIGURACIÓN DEL SOUNDTRACK  🎵
//
//   Los archivos de audio van en la carpeta "musica_choque/"
//   con nombres genéricos numerados:
//
//     pista_1.mp3, pista_2.mp3, pista_3.mp3 ... pista_20.mp3
//
//   Solo edita el TÍTULO, ARTISTA y DURACIÓN de cada pista.
//   Las pistas con título vacío ('') se ocultan del reproductor.
//
// ════════════════════════════════════════════════════════════════

const CARPETA = 'musica_choque/';

const PISTAS = [
// ┌─────┬──────────────────────────────┬────────────────────────────┬──────────┐
// │  #  │  TÍTULO                      │  ARTISTA                   │ DURACIÓN │
// ├─────┼──────────────────────────────┼────────────────────────────┼──────────┤
     { t: 'Choque de Héroes',             a: 'Choque de Héroes OST',   d: '2:17' },  // ← pista_1.mp3
     { t: 'Kilimanjaro',                  a: 'Choque de Héroes OST',   d: '2:08' },  // ← pista_2.mp3
     { t: 'L.A.B Metalúrgico',            a: 'Choque de Héroes OST',   d: '2:23' },  // ← pista_3.mp3
     { t: 'Legión del Mar',               a: 'Choque de Héroes OST',   d: '4:00' },  // ← pista_4.mp3
     { t: 'Encantadoras de Shalem',       a: 'Choque de Héroes OST',   d: '2:19' },  // ← pista_5.mp3
     { t: 'EX-Pada Reecarnada',           a: 'Choque de Héroes OST',   d: '2:38' },  // ← pista_6.mp3
     { t: 'Max-Kara',                     a: 'Choque de Héroes OST',   d: '2:58' },  // ← pista_7.mp3
     { t: 'Mictlán, la tierra de los muertos', a: 'Choque de Héroes OST',   d: '2:37' },  // ← pista_8.mp3
     { t: 'Archivos de Tenochtitlán',     a: 'Choque de Héroes OST',                        d: '2:58' },  // ← pista_9.mp3
     { t: 'Choque Multiversal',           a: 'Choque de Héroes OST',                        d: '3:03' },  // ← pista_10.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_11.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_12.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_13.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_14.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_15.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_16.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_17.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_18.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_19.mp3
     { t: '',                             a: '',                        d: ''     },  // ← pista_20.mp3
// └─────┴──────────────────────────────┴────────────────────────────┴──────────┘
];

// ════════════════════════════════════════════════════════════════
// ⚙️  ENGINE — No necesitas editar nada debajo de esta línea
// ════════════════════════════════════════════════════════════════

// Construir lista de pistas activas (solo las que tienen título)
const TRACKS = PISTAS
  .map((p, i) => ({ file: 'pista_' + (i + 1) + '.mp3', title: p.t, artist: p.a, duration: p.d, slot: i + 1 }))
  .filter(p => p.title.trim() !== '');

let currentIndex = -1;
let isPlaying = false;
let isLooping = true;
const audio = new Audio();
audio.preload = 'metadata';

function renderTracks() {
  const container = document.getElementById('track-list');
  if (!TRACKS.length) {
    container.innerHTML = '<div class="state-box"><div class="sb-icon">🎵</div><p>SIN PISTAS</p><p class="sb-sub">Edita los títulos en el array PISTAS para activar pistas.</p></div>';
    return;
  }
  container.innerHTML = TRACKS.map((t, i) => `
    <div class="track-item" id="track-${i}" onclick="selectTrack(${i})">
      <div class="track-num">${String(t.slot).padStart(2, '0')}</div>
      <div class="track-play-icon">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="track-info">
        <div class="track-name">${t.title}</div>
        <div class="track-artist">${t.artist || ''}</div>
      </div>
      <div class="track-duration">${t.duration || '--:--'}</div>
    </div>
  `).join('');
}

function selectTrack(index) {
  if (index < 0 || index >= TRACKS.length) return;
  document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
  currentIndex = index;
  const track = TRACKS[currentIndex];
  const el = document.getElementById('track-' + currentIndex);
  if (el) el.classList.add('active');
  document.querySelectorAll('.track-play-icon svg').forEach(svg => {
    svg.innerHTML = '<path d="M8 5v14l11-7z"/>';
  });
  audio.src = CARPETA + track.file;
  audio.loop = isLooping;
  audio.play().then(() => { isPlaying = true; updatePlayUI(); showPlayer(); })
    .catch(() => { isPlaying = false; updatePlayUI(); showPlayer(); });
  document.getElementById('p-name').textContent = track.title;
}

function togglePlay() {
  if (currentIndex < 0) { selectTrack(0); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play().catch(() => {}); isPlaying = true; }
  updatePlayUI();
}

function nextTrack() {
  if (!TRACKS.length) return;
  selectTrack((currentIndex + 1) % TRACKS.length);
}

function prevTrack() {
  if (!TRACKS.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  selectTrack((currentIndex - 1 + TRACKS.length) % TRACKS.length);
}

function toggleLoop() {
  isLooping = !isLooping;
  audio.loop = isLooping;
  document.getElementById('btn-loop').classList.toggle('loop-active', isLooping);
}

function updatePlayUI() {
  const icon = document.getElementById('play-icon');
  const viz = document.getElementById('visualizer');
  if (isPlaying) {
    icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    viz.classList.add('playing');
    if (currentIndex >= 0) {
      const ti = document.querySelector('#track-' + currentIndex + ' .track-play-icon svg');
      if (ti) ti.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    }
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    viz.classList.remove('playing');
  }
}

function showPlayer() {
  document.getElementById('player-bar').classList.add('visible');
}

function formatTime(s) {
  if (isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('progress-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
  document.getElementById('p-current').textContent = formatTime(audio.currentTime);
  document.getElementById('p-total').textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', () => { if (!isLooping) nextTrack(); });

document.getElementById('progress-wrap').addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

window.addEventListener('DOMContentLoaded', () => {
  renderTracks();
  document.getElementById('btn-loop').classList.add('loop-active');
});
</script>
</body>
</html>
