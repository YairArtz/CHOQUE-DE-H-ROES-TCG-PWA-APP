<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choque de Héroes en YouTube</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #f5a623; --accent-glow: rgba(245,166,35,.10); --accent-dim: rgba(245,166,35,.25);
      --bg: #07090f; --card: rgba(12,10,5,.97); --border: #2a200a;
      --text: #f0e6d0; --muted: #8a7a5a; --danger: #ff4d6d; --yt: #ff0000;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; padding: 0 0 40px; position: relative; overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(45deg, rgba(245,166,35,.03) 1px, transparent 1px),
                        linear-gradient(-45deg, rgba(245,166,35,.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: -10%; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(245,166,35,.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    #chh-nav {
      position: sticky; top: 0; z-index: 999; width: 100%;
      background: rgba(3,5,10,.96); border-bottom: 1px solid #0a1520;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; padding: 8px 14px; gap: 10px;
    }
    #chh-nav::after {
      content: ''; position: absolute; bottom: 0; left: 5%; right: 5%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .4;
    }
    .nav-back {
      font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; color: var(--accent); background: transparent;
      border: 1px solid rgba(245,166,35,.3); padding: 6px 10px; border-radius: 3px;
      cursor: pointer; text-decoration: none; white-space: nowrap;
      transition: background .15s; text-shadow: 0 0 8px var(--accent); opacity: .8;
    }
    .nav-back:active { background: rgba(245,166,35,.12); opacity: 1; }
    .nav-logo { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 0 6px rgba(245,166,35,.5)); }
    .nav-title {
      font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
      text-shadow: 0 0 8px var(--accent); flex: 1; text-align: center; line-height: 1.2;
    }
    .nav-spacer { width: 60px; flex-shrink: 0; }

    .wrap { width: 100%; max-width: 1100px; padding: 0 16px; position: relative; z-index: 1; }

    /* HEADER */
    .page-header {
      text-align: center; padding: 36px 0 28px;
    }
    .yt-logo-row {
      display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 14px;
    }
    .yt-icon {
      width: 52px; height: 52px; background: var(--yt);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(255,0,0,.4);
    }
    .yt-icon svg { width: 28px; height: 28px; fill: #fff; }
    .page-title {
      font-family: 'Orbitron', sans-serif; font-size: clamp(16px,4vw,28px);
      font-weight: 900; letter-spacing: 3px; color: #fff;
      text-shadow: 0 0 30px rgba(245,166,35,.3);
    }
    .page-title span { color: var(--yt); text-shadow: 0 0 20px rgba(255,0,0,.5); }
    .channel-link {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
      font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px;
      color: var(--muted); text-decoration: none; border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 3px; transition: border-color .2s, color .2s;
    }
    .channel-link:hover { border-color: var(--yt); color: var(--yt); }

    /* CANAL INFO */
    .channel-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 20px 24px; margin-bottom: 24px; position: relative;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      box-shadow: 0 0 60px rgba(245,166,35,.04);
    }
    .channel-card::before {
      content: ''; position: absolute; top: -1px; left: 8%; right: 8%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--yt), transparent); opacity: .6;
    }
    .ch-avatar {
      width: 64px; height: 64px; border-radius: 50%; background: var(--yt);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; color: #fff;
      flex-shrink: 0; box-shadow: 0 0 20px rgba(255,0,0,.3);
    }
    .ch-info { flex: 1; min-width: 160px; }
    .ch-name { font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 4px; letter-spacing: 1px; }
    .ch-handle { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .ch-stats { display: flex; gap: 20px; flex-wrap: wrap; }
    .ch-stat { text-align: center; }
    .ch-stat .val { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); }
    .ch-stat .lbl { font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 2px; color: var(--muted); margin-top: 2px; }
    .btn-subscribe {
      background: var(--yt); color: #fff; border: none; border-radius: 5px;
      padding: 10px 20px; font-family: 'Orbitron', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 20px rgba(255,0,0,.25); transition: box-shadow .2s, opacity .2s;
    }
    .btn-subscribe:hover { box-shadow: 0 4px 30px rgba(255,0,0,.45); opacity: .9; }

    /* CONTROLES */
    .controls-row {
      display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;
    }
    .filter-btn {
      font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px;
      padding: 7px 14px; border-radius: 3px; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      transition: .2s; white-space: nowrap;
    }
    .filter-btn.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent-dim); }
    .filter-btn:hover:not(.active) { border-color: var(--accent-dim); color: var(--text); }
    .search-input {
      flex: 1; min-width: 180px; background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: 5px; padding: 8px 14px; color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent-dim); }
    .refresh-btn {
      font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px;
      padding: 7px 14px; border-radius: 3px; cursor: pointer;
      border: 1px solid var(--accent-dim); background: var(--accent-glow);
      color: var(--accent); transition: .2s; white-space: nowrap;
    }
    .refresh-btn:hover { border-color: var(--accent); }
    .refresh-btn.spinning { animation: spin .8s linear infinite; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PLAYER MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.88);
      z-index: 1000; display: none; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      width: 100%; max-width: 900px; position: relative; overflow: hidden;
      box-shadow: 0 0 80px rgba(245,166,35,.1);
    }
    .modal-box::before {
      content: ''; position: absolute; top: 0; left: 8%; right: 8%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--yt), transparent);
    }
    .modal-close {
      position: absolute; top: 12px; right: 14px; background: rgba(255,77,109,.15);
      border: 1px solid rgba(255,77,109,.3); border-radius: 3px; padding: 4px 10px;
      color: var(--danger); cursor: pointer; font-family: 'Orbitron', sans-serif;
      font-size: 10px; letter-spacing: 1px; z-index: 2;
    }
    .modal-close:hover { background: rgba(255,77,109,.3); }
    .video-iframe-wrap {
      position: relative; padding-top: 56.25%; background: #000;
    }
    .video-iframe-wrap iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    .modal-info { padding: 18px 20px 20px; }
    .modal-title { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px; line-height: 1.4; }
    .modal-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
    .modal-meta span { display: flex; align-items: center; gap: 4px; }
    .modal-desc { font-size: 13px; color: rgba(240,230,208,.7); margin-top: 10px; line-height: 1.6; max-height: 80px; overflow-y: auto; }
    .modal-yt-btn {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
      background: var(--yt); color: #fff; text-decoration: none; padding: 8px 18px;
      border-radius: 5px; font-family: 'Orbitron', sans-serif; font-size: 9px;
      letter-spacing: 2px; font-weight: 700;
    }

    /* VIDEO GRID */
    .video-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px;
      margin-bottom: 24px;
    }
    .video-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; cursor: pointer; transition: border-color .2s, transform .15s;
      position: relative;
    }
    .video-card:hover { border-color: var(--accent-dim); transform: translateY(-2px); }
    .video-card.new-video { border-color: rgba(255,0,0,.4); }
    .new-badge {
      position: absolute; top: 10px; left: 10px; background: var(--yt);
      color: #fff; font-family: 'Orbitron', sans-serif; font-size: 8px;
      letter-spacing: 2px; padding: 3px 8px; border-radius: 2px; z-index: 1;
      box-shadow: 0 2px 10px rgba(255,0,0,.4);
    }
    .thumb-wrap { position: relative; padding-top: 56.25%; background: #111; overflow: hidden; }
    .thumb-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
    .video-card:hover .thumb-wrap img { transform: scale(1.03); }
    .play-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.3); opacity: 0; transition: opacity .2s;
    }
    .video-card:hover .play-overlay { opacity: 1; }
    .play-btn-circle {
      width: 52px; height: 52px; background: rgba(255,0,0,.9); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .play-btn-circle svg { width: 22px; height: 22px; fill: #fff; margin-left: 3px; }
    .duration-badge {
      position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,.8);
      color: #fff; font-family: 'Orbitron', sans-serif; font-size: 9px;
      padding: 2px 6px; border-radius: 3px;
    }
    .vc-body { padding: 12px 14px 14px; }
    .vc-title {
      font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
      color: #fff; letter-spacing: .5px; line-height: 1.4; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .vc-meta { display: flex; justify-content: space-between; align-items: center; }
    .vc-date { font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 1px; color: var(--muted); }
    .vc-views { font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 1px; color: var(--muted); }

    /* LIVE BADGE */
    .live-badge {
      position: absolute; top: 10px; right: 10px; background: var(--yt);
      color: #fff; font-family: 'Orbitron', sans-serif; font-size: 8px;
      letter-spacing: 2px; padding: 3px 8px; border-radius: 2px; z-index: 1;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* LOADING / EMPTY / ERROR */
    .state-box {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .state-box .sb-icon { font-size: 48px; margin-bottom: 14px; }
    .state-box p { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 3px; }
    .state-box p.sb-sub { font-size: 11px; color: var(--muted); margin-top: 8px; letter-spacing: 1px; font-family: 'Rajdhani', sans-serif; }
    .loader { display: inline-block; width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }

    /* COUNTER */
    .vid-counter { font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; }
    .vid-counter span { color: var(--accent); }

    /* LAST UPDATED */
    .last-updated { text-align: center; font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 2px; color: var(--border); margin-top: 10px; }

    /* LOAD MORE */
    .load-more-btn {
      display: block; width: 100%; max-width: 300px; margin: 0 auto 20px;
      background: transparent; border: 1px solid var(--accent-dim); border-radius: 5px;
      padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 10px;
      letter-spacing: 2px; color: var(--accent); cursor: pointer; transition: .2s;
    }
    .load-more-btn:hover { background: var(--accent-glow); border-color: var(--accent); }

    footer { position: relative; z-index: 1; text-align: center; padding: 10px 0; }
    footer p { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: #1e1508; letter-spacing: 1px; }

    @media(max-width:480px) {
      .channel-card { flex-direction: column; text-align: center; }
      .ch-stats { justify-content: center; }
      .video-grid { grid-template-columns: 1fr; }
      .controls-row { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const CHANNEL_ID   = 'UCPW3FGg-uxF-dheu1qg9adg';
const CHANNEL_HANDLE = '@choquedeheroestcg9035';
const FEED_URL     = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
const CHANNEL_URL  = `https://www.youtube.com/${CHANNEL_HANDLE}`;
const NEW_DAYS     = 7;
const PAGE_SIZE    = 12;
const AUTO_REFRESH = 300;

// ─── CORS PROXIES — cada uno tiene su formato propio ────────────

// ─── ESTADO ──────────────────────────────────────────────────────
let allVideos    = [];
let filtered     = [];
let displayed    = 0;
let activeFilter = 'all';

// ─── INIT ────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadVideos();
  loadChannelAvatar();
  setInterval(refresh, AUTO_REFRESH * 1000);
});

// ─── FETCH CON PROXIES ──────────────────────────────────────────
async function fetchViaProxies(url, timeout = 12000) {
  const log = [];

  // Lista de intentos: nombre, URL, tipo de respuesta esperada
  const attempts = [
    { name: 'rss2json',      url: `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=50`,  type: 'json' },
    { name: 'allorigins-get', url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,                     type: 'allorigins' },
    { name: 'allorigins-raw', url: `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,                     type: 'text' },
    { name: 'corsproxy-new',  url: `https://corsproxy.io/?url=${encodeURIComponent(url)}`,                              type: 'text' },
    { name: 'corsproxy-old',  url: `https://corsproxy.io/?${encodeURIComponent(url)}`,                                  type: 'text' },
    { name: 'cors-lol',       url: `https://api.cors.lol/?url=${encodeURIComponent(url)}`,                              type: 'text' },
    { name: 'codetabs',       url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,                type: 'text' },
  ];

  for (const a of attempts) {
    try {
      const res = await fetchWithTimeout(a.url, timeout);
      if (!res.ok) { log.push(`${a.name}: HTTP ${res.status}`); continue; }

      if (a.type === 'json') {
        const json = await res.json();
        if (json.status === 'ok' && json.items) {
          log.push(`${a.name}: OK ✓`);
          console.log('Feed cargado via', a.name, log);
          return JSON.stringify(json);
        }
        log.push(`${a.name}: status=${json.status||'?'}, items=${json.items?.length||0}`);

      } else if (a.type === 'allorigins') {
        const data = await res.json();
        const c = data.contents || '';
        if (c.length > 100) {
          // Intentar parsear como XML
          const parser = new DOMParser();
          const xml = parser.parseFromString(c, 'text/xml');
          if (!xml.querySelector('parsererror') && xml.querySelectorAll('entry').length) {
            log.push(`${a.name}: OK ✓ (${xml.querySelectorAll('entry').length} entries)`);
            console.log('Feed cargado via', a.name, log);
            return c;
          }
          log.push(`${a.name}: contenido no es feed válido (${c.length} chars)`);
        } else {
          log.push(`${a.name}: respuesta muy corta (${c.length} chars)`);
        }

      } else { // text
        const text = await res.text();
        if (text.length > 100) {
          const parser = new DOMParser();
          const xml = parser.parseFromString(text, 'text/xml');
          if (!xml.querySelector('parsererror') && xml.querySelectorAll('entry').length) {
            log.push(`${a.name}: OK ✓ (${xml.querySelectorAll('entry').length} entries)`);
            console.log('Feed cargado via', a.name, log);
            return text;
          }
          log.push(`${a.name}: no es feed válido (${text.substring(0,80)}…)`);
        } else {
          log.push(`${a.name}: respuesta muy corta (${text.length} chars)`);
        }
      }
    } catch(e) { log.push(`${a.name}: ${e.message}`); }
  }

  console.error('Todos los proxies fallaron:', log);
  throw new Error('No se pudo conectar al feed.\n' + log.join('\n'));
}

function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

// ─── AVATAR DEL CANAL ───────────────────────────────────────────
async function loadChannelAvatar() {
  const proxyUrls = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(CHANNEL_URL)}`,
    `https://api.cors.lol/?url=${encodeURIComponent(CHANNEL_URL)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(CHANNEL_URL)}`,
  ];
  for (const pUrl of proxyUrls) {
    try {
      const res = await fetchWithTimeout(pUrl, 12000);
      if (!res.ok) continue;
      let html;
      // allorigins /get devuelve JSON con .contents
      if (pUrl.includes('allorigins')) {
        const data = await res.json();
        html = data.contents || '';
      } else {
        html = await res.text();
      }
      if (!html || html.length < 200) continue;
      let avatarUrl = '';
      const ogMatch = html.match(/<meta\s+property="og:image"\s+content="([^"]+)"/i)
                   || html.match(/<meta\s+content="([^"]+)"\s+property="og:image"/i);
      if (ogMatch) {
        avatarUrl = ogMatch[1];
      } else {
        const ytMatch = html.match(/(https:\/\/yt3\.googleusercontent\.com\/[^"'\s]+)/);
        if (ytMatch) avatarUrl = ytMatch[1];
      }
      if (avatarUrl) {
        const img = document.getElementById('ch-avatar-img');
        img.src = avatarUrl;
        img.onload = () => { img.style.display = 'block'; img.nextElementSibling.style.display = 'none'; };
        return;
      }
    } catch(e) { /* siguiente proxy */ }
  }
}

// ─── CARGA PRINCIPAL ─────────────────────────────────────────────
async function loadVideos() {
  allVideos = [];
  displayed = 0;
  showLoading();

  try {
    const raw = await fetchViaProxies(FEED_URL);

    // ¿Es JSON de rss2json?
    if (raw.trim().startsWith('{')) {
      const data = JSON.parse(raw);
      if (data.status === 'ok' && data.items) {
        allVideos = data.items.map(item => ({
          id:          extractVideoId(item.link),
          title:       item.title,
          description: item.description || '',
          thumbnail:   item.thumbnail || item.enclosure?.link || '',
          publishedAt: item.pubDate,
          views:       null,
          duration:    null,
          isLive:      false,
        }));
        finishLoad();
        return;
      }
    }

    // Es XML — parsear como Atom feed
    const parser = new DOMParser();
    const xml = parser.parseFromString(raw, 'text/xml');
    const parseErr = xml.querySelector('parsererror');
    if (parseErr) throw new Error('Feed XML inválido');

    const entries = Array.from(xml.querySelectorAll('entry'));
    if (!entries.length) throw new Error('El feed no devolvió videos');

    // Namespace para media:group
    allVideos = entries.map(e => {
      const videoId = e.querySelector('videoId')?.textContent
                   || (e.querySelector('id')?.textContent || '').replace('yt:video:', '');
      const title   = e.querySelector('title')?.textContent || '';
      const pubDate = e.querySelector('published')?.textContent || '';
      const desc    = e.querySelector('group description')?.textContent
                   || e.querySelector('description')?.textContent || '';
      const thumb   = e.querySelector('group thumbnail')?.getAttribute('url')
                   || `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
      const views   = e.querySelector('group community statistics')?.getAttribute('views')
                   || e.querySelector('statistics')?.getAttribute('views') || null;

      return {
        id: videoId, title, description: desc, thumbnail: thumb,
        publishedAt: pubDate, views, duration: null, isLive: false,
      };
    });

    updateChannelStats(entries.length);
    finishLoad();
  } catch(err) {
    showError(err.message);
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────
function extractVideoId(url) {
  const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
  return m ? m[1] : url;
}

function isNew(dateStr) {
  return (Date.now() - new Date(dateStr).getTime()) / 864e5 <= NEW_DAYS;
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('es-MX', { year:'numeric', month:'short', day:'numeric' });
}

function formatViews(n) {
  if (!n) return '';
  const num = parseInt(n);
  if (num >= 1e6) return (num/1e6).toFixed(1) + 'M vistas';
  if (num >= 1e3) return (num/1e3).toFixed(1) + 'K vistas';
  return num + ' vistas';
}

function formatDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

function formatCount(n) {
  if (!n) return '—';
  const num = parseInt(n);
  if (num >= 1e6) return (num/1e6).toFixed(1) + 'M';
  if (num >= 1e3) return Math.round(num/1e3) + 'K';
  return num.toString();
}

function updateChannelStats(videos) {
  document.getElementById('stat-videos').textContent = formatCount(videos);
}

// ─── RENDER ──────────────────────────────────────────────────────
function finishLoad() {
  buildVideoMap();
  filtered = applyActiveFilter(allVideos);
  displayed = Math.min(PAGE_SIZE, filtered.length);
  renderGrid(filtered.slice(0, displayed));
  updateCounter();
  updateLoadMore();
  document.getElementById('last-updated').textContent = 'Última actualización: ' + new Date().toLocaleTimeString('es-MX');
}

function applyActiveFilter(vids) {
  const q = (document.getElementById('search-q')?.value || '').toLowerCase();
  return vids.filter(v => {
    const matchSearch = !q || v.title.toLowerCase().includes(q);
    const matchFilter = activeFilter === 'all' || (activeFilter === 'new' && isNew(v.publishedAt));
    return matchSearch && matchFilter;
  });
}

function renderGrid(videos) {
  const area = document.getElementById('content-area');
  if (!videos.length) {
    area.innerHTML = `<div class="state-box">
      <div class="sb-icon">📭</div><p>SIN VIDEOS</p>
      <p class="sb-sub">No se encontraron videos con ese criterio.</p>
    </div>`;
    return;
  }
  area.innerHTML = `<div class="video-grid">${videos.map(videoCard).join('')}</div>`;
}

function videoCard(v) {
  const novedad = isNew(v.publishedAt);
  const thumb   = v.thumbnail || `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`;
  const dur     = formatDuration(v.duration);
  const views   = formatViews(v.views);
  const date    = formatDate(v.publishedAt);

  return `<div class="video-card${novedad?' new-video':''}" data-vid="${v.id}">
    ${novedad ? '<div class="new-badge">NUEVO</div>' : ''}
    ${v.isLive ? '<div class="live-badge">EN VIVO</div>' : ''}
    <div class="thumb-wrap">
      <img src="${thumb}" alt="" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'"/>
      <div class="play-overlay">
        <div class="play-btn-circle">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      ${dur ? `<div class="duration-badge">${dur}</div>` : ''}
    </div>
    <div class="vc-body">
      <div class="vc-title">${v.title}</div>
      <div class="vc-meta">
        <span class="vc-date">📅 ${date}</span>
        ${views ? `<span class="vc-views">👁 ${views}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function updateCounter() {
  document.getElementById('vid-counter').innerHTML = `Mostrando <span>${displayed}</span> de <span>${filtered.length}</span> videos`;
}

function updateLoadMore() {
  document.getElementById('load-more-btn').style.display = displayed < filtered.length ? 'block' : 'none';
}

// ─── FILTROS Y BÚSQUEDA ──────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterVideos();
}

function filterVideos() {
  filtered = applyActiveFilter(allVideos);
  displayed = Math.min(PAGE_SIZE, filtered.length);
  renderGrid(filtered.slice(0, displayed));
  updateCounter();
  updateLoadMore();
}

// ─── CARGAR MÁS ──────────────────────────────────────────────────
function loadMore() {
  displayed = Math.min(displayed + PAGE_SIZE, filtered.length);
  renderGrid(filtered.slice(0, displayed));
  updateCounter();
  updateLoadMore();
}

// ─── REFRESH ─────────────────────────────────────────────────────
async function refresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning'); btn.textContent = '⟳';
  await loadVideos();
  btn.classList.remove('spinning'); btn.textContent = '⟳ ACTUALIZAR';
}

// ─── VIDEO DATA MAP (evita strings inline en onclick) ────────────
const videoMap = {};

function buildVideoMap() {
  allVideos.forEach(v => { videoMap[v.id] = v; });
}

// Event delegation — click en cualquier video-card
document.addEventListener('click', e => {
  const card = e.target.closest('.video-card[data-vid]');
  if (!card) return;
  const vid = card.getAttribute('data-vid');
  if (vid) openVideo(vid);
});

// ─── PLAYER ──────────────────────────────────────────────────────
function openVideo(id) {
  const v = videoMap[id];
  const ytLink = `https://www.youtube.com/watch?v=${id}`;
  if (!v) { window.open(ytLink, '_blank'); return; }

  const thumb = v.thumbnail || `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;

  document.getElementById('modal-thumb').src         = thumb;
  document.getElementById('modal-thumb-wrap').onclick = () => { window.open(ytLink, '_blank'); };
  document.getElementById('modal-title').textContent = v.title;
  document.getElementById('modal-date').textContent  = '📅 ' + formatDate(v.publishedAt);
  document.getElementById('modal-views').textContent = v.views ? '👁 ' + formatViews(v.views) : '';
  document.getElementById('modal-desc').textContent  = (v.description || '').slice(0, 300);
  document.getElementById('modal-yt-link').href      = ytLink;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showIframeFallback() { /* ya no se usa */ }

function closeModal(evt) {
  if (evt && evt.target !== document.getElementById('modal') && !evt.target.closest('.modal-close')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({target:document.getElementById('modal')}); });

// ─── UI STATES ───────────────────────────────────────────────────
function showLoading() {
  document.getElementById('content-area').innerHTML = `<div class="state-box">
    <div class="loader"></div><p>CARGANDO VIDEOS</p>
    <p class="sb-sub">Conectando con YouTube…</p>
  </div>`;
  document.getElementById('vid-counter').innerHTML = '';
  document.getElementById('load-more-btn').style.display = 'none';
}

function showError(msg) {
  const parts = msg.split('\n');
  const title = parts[0];
  const details = parts.slice(1).filter(l => l.trim()).map(l =>
    `<div style="font-family:monospace;font-size:9px;color:#ff6b6b;text-align:left;padding:1px 16px;word-break:break-all;">${l}</div>`
  ).join('');
  document.getElementById('content-area').innerHTML = `<div class="state-box">
    <div class="sb-icon">⚠️</div>
    <p>ERROR AL CARGAR</p>
    <p class="sb-sub">${title}</p>
    <div style="margin:10px auto;max-width:380px;">${details}</div>
    <p class="sb-sub" style="margin-top:12px;">Intenta actualizar o visita el canal directamente.</p>
    <button class="refresh-btn" onclick="refresh()" style="margin:16px auto 0;display:block;">⟳ REINTENTAR</button>
  </div>`;
}

function showMsg(m) {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#07090f;padding:10px 24px;border-radius:4px;font-family:Orbitron,sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;z-index:9999;white-space:nowrap;';
  d.textContent = m; document.body.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

function decodeStr(s) {
  try { return decodeURIComponent(s); } catch(e) { return s; }
}
